<!DOCTYPE html>
<html lang="{{ site.lang | default: 'zh-CN' }}">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  {% seo %}
  {% feed_meta %}
  
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/css/custom.css' | relative_url }}">
  
  <!-- 主题默认样式（minima） -->
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  
  <!-- Favicon -->
  <link rel="icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="shortcut icon" href="{{ '/favicon.svg' | relative_url }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ '/favicon.svg' | relative_url }}">
  <meta name="theme-color" content="#7b68ee">
  
  {% include custom-head.html %}
</head>
<body>
  {% include header.html %}
  
  <main class="page-content" aria-label="内容">
    <div class="wrapper">
      {{ content }}
    </div>
  </main>
  
  {% include footer.html %}
  
  <!-- 粒子背景 -->
  <canvas id="particles-canvas"></canvas>
  
  <!-- 主题默认脚本 -->
  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
