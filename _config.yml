title: 电气自动化与嵌入式开发
email: your-email@example.com
description: >-
  一个基于 Jekyll 和 GitHub Pages 搭建的个人博客，
  记录电气自动化、嵌入式系统、单片机开发、PLC 编程与硬件设计的学习与实践。
baseurl: "/myblog1"
url: "https://wj123-ui.github.io"
author:
  name: "Wj123-ui"
  email: "your-email@example.com"
  github: "Wj123-ui"
  twitter: ""
  linkedin: ""

twitter_username: 
github_username: Wj123-ui
linkedin_username: 

theme: minima
minima:
  skin: dark
  date_format: "%Y-%m-%d"
  social_links:
    - { platform: github,  user_url: "https://github.com/Wj123-ui" }
    - { platform: twitter, user_url: "https://twitter.com/yourusername" }

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

paginate: 5
paginate_path: "/page:num/"

show_excerpts: true

kramdown:
  input: GFM
  syntax_highlighter: rouge

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
