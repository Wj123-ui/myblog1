<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7b68ee" />
      <stop offset="100%" stop-color="#ff69b4" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="2" dy="2" result="offsetblur" />
      <feMerge>
        <feMergeNode in="offsetblur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <circle cx="50" cy="50" r="40" fill="url(#grad)" filter="url(#shadow)" />
  
  <!-- 闪电符号 -->
  <path d="M55,30 L45,50 L50,50 L55,70 L65,50 L60,50 Z" fill="white" opacity="0.9" />
  
  <!-- 外圈光晕 -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#grad)" stroke-width="2" opacity="0.5" />
</svg>