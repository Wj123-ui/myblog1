<footer class="site-footer glass-card" role="contentinfo">
  <div class="footer-content">
    <div class="footer-inner">
      <div class="footer-emoji-row">
        <span aria-hidden="true">📬</span>
        <span aria-hidden="true">💬</span>
        <span aria-hidden="true">🚀</span>
      </div>
      <p class="footer-tagline">
        欢迎交流讨论，一起探索电气与嵌入式的无限可能！
      </p>
      <div class="social-links">
        <a href="https://github.com/{{ site.github_username }}" class="social-btn" target="_blank" rel="noopener" aria-label="GitHub 主页">
          <span aria-hidden="true" style="margin-right: 8px;">🐙</span> GitHub
        </a>
        <a href="mailto:{{ site.email }}" class="social-btn" aria-label="发送邮件">
          <span aria-hidden="true" style="margin-right: 8px;">📧</span> Email
        </a>
        <a href="{{ site.url }}{{ site.baseurl }}" class="social-btn social-btn--alt">
          <span aria-hidden="true" style="margin-right: 8px;">🌐</span> 博客主页
        </a>
      </div>
      <p class="footer-copyright">
        &copy; {{ site.time | date: '%Y' }} {{ site.title }} &middot; 基于 Jekyll + GitHub Pages 构建<br>
        <span class="footer-theme-info">主题：深空星空 · 配色：黑金</span>
      </p>
    </div>
  </div>
</footer>
