<header class="site-header glass-card">
  <div class="header-container">
    <!-- Logo / Site Title -->
    <a href="{{ '/' | relative_url }}" class="site-title">
      <span class="logo-icon">⚡</span>
      <span class="title-text">{{ site.title }}</span>
    </a>

    <!-- Desktop Navigation -->
    <nav class="desktop-nav">
      <ul class="nav-list">
        <li><a href="{{ '/' | relative_url }}" class="nav-link">🏠 首页</a></li>
        <li><a href="{{ '/archive' | relative_url }}" class="nav-link">📚 文章归档</a></li>
        <li><a href="{{ '/about' | relative_url }}" class="nav-link">👤 关于</a></li>
        <li><a href="{{ '/projects' | relative_url }}" class="nav-link">🔧 项目</a></li>
        <li><a href="{{ site.github_username | prepend: 'https://github.com/' }}" class="nav-link" target="_blank">🐙 GitHub</a></li>
      </ul>
    </nav>

    <!-- Mobile Menu Toggle -->
    <button class="mobile-toggle" aria-label="Toggle menu">
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
      <span class="toggle-bar"></span>
    </button>
  </div>

  <!-- Mobile Navigation -->
  <nav class="mobile-nav">
    <ul class="mobile-nav-list">
      <li><a href="{{ '/' | relative_url }}" class="mobile-nav-link">🏠 首页</a></li>
      <li><a href="{{ '/archive' | relative_url }}" class="mobile-nav-link">📚 文章归档</a></li>
      <li><a href="{{ '/about' | relative_url }}" class="mobile-nav-link">👤 关于</a></li>
      <li><a href="{{ '/projects' | relative_url }}" class="mobile-nav-link">🔧 项目</a></li>
      <li><a href="{{ site.github_username | prepend: 'https://github.com/' }}" class="mobile-nav-link" target="_blank">🐙 GitHub</a></li>
    </ul>
  </nav>
</header>

<script>
(function() {
  const toggle = document.querySelector('.mobile-toggle');
  const mobileNav = document.querySelector('.mobile-nav');
  const body = document.body;

  if (toggle) {
    toggle.addEventListener('click', function() {
      const isExpanded = toggle.getAttribute('aria-expanded') === 'true';
      toggle.setAttribute('aria-expanded', !isExpanded);
      mobileNav.classList.toggle('active');
      body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
    });

    // Close mobile menu when clicking a link
    document.querySelectorAll('.mobile-nav-link').forEach(link => {
      link.addEventListener('click', () => {
        toggle.setAttribute('aria-expanded', 'false');
        mobileNav.classList.remove('active');
        body.style.overflow = '';
      });
    });
  }
})();
</script>
